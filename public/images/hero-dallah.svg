<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#050505"/>
      <stop offset="0.55" stop-color="#0A0A0A"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="25%" r="70%">
      <stop offset="0" stop-color="#D4AF37" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#CD7F32" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F5E7A3"/>
      <stop offset="0.45" stop-color="#D4AF37"/>
      <stop offset="1" stop-color="#CD7F32"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- abstract dallah silhouette -->
  <g transform="translate(830 470)" filter="url(#soft)">
    <path d="M-70 -120 C-30 -200, 60 -200, 90 -120 C115 -70, 110 10, 60 60 C15 110,-55 95,-85 50 C-115 5,-110 -70,-70 -120 Z"
          fill="url(#gold)" fill-opacity="0.9"/>
    <path d="M80 -55 C165 -90, 240 -40, 210 25 C192 62, 130 80, 85 58"
          fill="none" stroke="url(#gold)" stroke-width="18" stroke-linecap="round"/>
    <path d="M-80 -35 C-160 -110,-230 -60,-205 20 C-185 85,-120 95,-70 58"
          fill="none" stroke="url(#gold)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="18" cy="-18" r="10" fill="#0A0A0A" opacity="0.5"/>
  </g>

  <!-- steam -->
  <g opacity="0.65">
    <path d="M810 290 C780 250, 830 230, 800 190 C770 150, 835 130, 805 95"
          fill="none" stroke="#F5F0E6" stroke-opacity="0.22" stroke-width="10" stroke-linecap="round"/>
    <path d="M875 300 C845 260, 900 240, 875 205 C850 170, 910 145, 890 115"
          fill="none" stroke="#F5F0E6" stroke-opacity="0.16" stroke-width="8" stroke-linecap="round"/>
  </g>

  <text x="80" y="110" fill="#F5F0E6" font-family="Inter, system-ui, -apple-system, Segoe UI, Arial" font-size="26" opacity="0.82">
    Placeholder  replace with AI-generated hero image
  </text>
  <text x="80" y="150" fill="#D4AF37" font-family="Inter, system-ui, -apple-system, Segoe UI, Arial" font-size="18" opacity="0.9">
    Prompt: Golden Arabic dallah coffee pot, dark moody background, luxury food photography
  </text>
</svg>

